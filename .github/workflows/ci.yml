name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # 変更ファイル判定（全体トリガー）
  changes:
    runs-on: ubuntu-latest

    outputs:
      app: ${{ steps.filter.outputs.app }}

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      - name: 差分チェック
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'src/**/*.go'
              - 'src/go.mod'
              - 'src/go.sum'

  # 静的コード解析
  lint:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      - name: 環境変数ファイルをリネーム
        run: cp ./.env.example ./.env

      - name: Dockerコンテナのビルド
        run: docker compose build

      # lintの実行
      - name: lint
        run: docker compose run --rm api golangci-lint run -v ./...

  # テスト
  test:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      - name: 環境変数ファイルをリネーム
        run: cp ./.env.example ./.env

      - name: Dockerコンテナのビルド
        run: docker compose build

      - name: Dockerコンテナの起動
        run: docker compose up -d

      - name: DB接続待機処理
        run: docker compose exec api sh -c 'until pg_isready -h db -U "${DB_USER}"; do sleep 1; done'

      - name: マイグレーションの初期化
        run: docker compose exec api go run cmd/migrate/main.go init

      - name: マイグレーションの実行
        run: |
          if ls src/internal/infrastructure/migrations/*.sql >/dev/null 2>&1; then
            docker compose exec api go run cmd/migrate/main.go migrate
          else
            echo "No migrations found. Skip."
          fi

      - name: マスタデータの登録
        run: |
          if ls src/internal/infrastructure/database/seed/local/*.go >/dev/null 2>&1; then
            docker compose exec api go run cmd/seed/main.go
          else
            echo "No seeds found. Skip."
          fi

      - name: テストの実行
        run: make test
